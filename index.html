<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <link rel="icon" type="image/svg+xml" href="/favicon.svg" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Lumarko Mining Innovations</title>
    <meta name="description" content="Lumarko Mining Innovations partners with Canada's leading mining operators to deliver practical, field-driven solutions that enhance safety, reliability, and operational performance. Home of the award-winning TrackTopper System." />
    <meta property="og:title" content="Lumarko Mining Innovations" />
    <meta property="og:description" content="Operational excellence for mining. Built from the field up." />
    <meta property="og:type" content="website" />
    <meta property="og:url" content="https://lumarko.ca" />
  </head>
  <body>
    <!-- Hidden Netlify forms for SPA bot detection -->
    <form name="contact" netlify netlify-honeypot="bot-field" hidden>
      <input name="form-name" type="hidden" value="contact" />
      <input name="name" type="text" />
      <input name="email" type="email" />
      <input name="company" type="text" />
      <input name="phone" type="tel" />
      <textarea name="message"></textarea>
    </form>
    <form name="job-application" netlify netlify-honeypot="bot-field" hidden>
      <input name="form-name" type="hidden" value="job-application" />
      <input name="position" type="text" />
      <input name="fullName" type="text" />
      <input name="email" type="email" />
      <input name="phone" type="tel" />
      <input name="resume" type="file" />
      <textarea name="coverLetter"></textarea>
    </form>
    <div id="root"></div>
    <script type="module" src="/src/main.jsx"></script>
  </body>
</html>
