<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <link rel="icon" type="image/svg+xml" href="/favicon.svg" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Lumarko Mining Innovations</title>
  </head>
  <body>
    <!-- Hidden Netlify forms for SPA bot detection -->
    <form name="contact" netlify netlify-honeypot="bot-field" hidden>
      <input name="form-name" type="hidden" value="contact" />
      <input name="name" type="text" />
      <input name="email" type="email" />
      <input name="company" type="text" />
      <input name="phone" type="tel" />
      <textarea name="message"></textarea>
    </form>
    <form name="job-application" netlify netlify-honeypot="bot-field" hidden>
      <input name="form-name" type="hidden" value="job-application" />
      <input name="position" type="text" />
      <input name="fullName" type="text" />
      <input name="email" type="email" />
      <input name="phone" type="tel" />
      <input name="resume" type="file" />
      <textarea name="coverLetter"></textarea>
    </form>
    <div id="root"></div>
    <script type="module" src="/src/main.jsx"></script>
  </body>
</html>
